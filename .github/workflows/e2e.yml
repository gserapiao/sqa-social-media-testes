name: E2E Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e:
    name: Run Playwright E2E
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: sqa_social_media
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            e2e/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: |
          chmod +x mvnw
          ./mvnw -B -DskipTests dependency:go-offline

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Install E2E dependencies
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps

      - name: Start API
        working-directory: api
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/sqa_social_media
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: |
          ./mvnw spring-boot:run > ../api.log 2>&1 &
          for i in {1..60}; do
            if curl --fail --silent http://localhost:8080/posts?limit=1\&skip=0 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../api.log
          exit 1

      - name: Build client
        working-directory: client
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

      - name: Start client
        working-directory: client
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: |
          npm run start > ../client.log 2>&1 &
          for i in {1..60}; do
            if curl --fail --silent http://localhost:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../client.log
          exit 1

      - name: Run E2E tests
        working-directory: e2e
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
